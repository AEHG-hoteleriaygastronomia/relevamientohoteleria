const COLORES_CAT = {
  "Hotel": "#7C3AED",
  "Hotel gremial": "#0891B2",
  "Hostel": "#D97706",
  "Cabañas": "#059669",
  "Apart Hotel": "#DB2777",
  "Hostería": "#EA580C",
  "Glamping / Camping": "#65A30D",
  "Alojamiento turístico rural": "#0369A1",
};
const COLOR_INACTIVO = "#DC2626";

const map = L.map('map', { zoomControl: false }).setView([-38.002, -57.560], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CartoDB', subdomains: 'abcd', maxZoom: 19
}).addTo(map);
L.control.zoom({ position: 'bottomright' }).addTo(map);

const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<h4>Categoría</h4>' +
    Object.entries(COLORES_CAT).map(([k,v]) =>
      `<div class="legend-item"><div class="legend-dot" style="background:${v}"></div>${k}</div>`
    ).join('') +
    '<div class="legend-sep"></div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:#DC2626"></div>Inactivo</div>';
  return div;
};
legend.addTo(map);

let markers = [];

function makeMarker(r) {
  const isActivo = r['Estado de actividad'] === 'Activo';
  const color = isActivo ? (COLORES_CAT[r.Categoría] || "#7C3AED") : COLOR_INACTIVO;
  const icon = L.divIcon({
    html: `<div style="width:12px;height:12px;background:${color};border:2px solid rgba(255,255,255,0.9);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3);cursor:pointer;"></div>`,
    className: '', iconSize: [12,12], iconAnchor: [6,6]
  });
  const sindStr = r.Sindicato ? `<div class="popup-sindicato">🏛 ${r.Sindicato}</div>` : '';
  const estadoClass = isActivo ? '' : 'inactivo';
  const popup = `
    <div class="popup-nombre">${r['Nombre comercial']}</div>
    <div class="popup-badge" style="background:${color}18;color:${color};border:1px solid ${color}44">${r.Categoría}</div>
    <div class="popup-dir">📍 ${r.Domicilio.split(',')[0]}</div>
    ${sindStr}
    <div class="popup-meta">
      <span class="popup-tag ${estadoClass}">${isActivo ? '✓ Activo' : '✗ Inactivo'}</span>
      <span class="popup-tag">ID: ${r.ID}</span>
    </div>`;
  return L.marker([r.lat, r.lng], { icon }).bindPopup(popup, { maxWidth: 300 });
}

function aplicarFiltros() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const cat = document.getElementById('filtroCategoria').value;
  const est = document.getElementById('filtroEstado').value;
  const filtrados = DATA.filter(r =>
    (!cat || r.Categoría === cat) &&
    (!est || r['Estado de actividad'] === est)
  );
  filtrados.forEach(r => {
    const m = makeMarker(r);
    m.addTo(map);
    markers.push(m);
  });
  document.getElementById('stats').textContent = `${filtrados.length} establecimientos`;
}
aplicarFiltros();
</script>
