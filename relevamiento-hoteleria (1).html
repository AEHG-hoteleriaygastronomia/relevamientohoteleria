function normalizar(str) {

    .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i')
    .replace(/ó/g,'o').replace(/ú/g,'u').replace(/ü/g,'u').replace(/ñ/g,'n');

function makeMarker(r) {
  var isActivo = r.estado === 'Activo';
  var color = isActivo ? (COLORES_CAT[r.categoria] || "#7C3AED") : COLOR_INACTIVO;
  var icon = L.divIcon({
    html: '<div style="width:12px;height:12px;background:' + color + ';border:2px solid rgba(255,255,255,0.9);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.3);cursor:pointer;"></div>',

}

function aplicarFiltros() {
  for (var i = 0; i < markers.length; i++) { map.removeLayer(markers[i]); }
  markers = [];
  markerMap = {};
  var cat = document.getElementById('filtroCategoria').value;
  var est = document.getElementById('filtroEstado').value;
  var filtrados = [];
  for (var j = 0; j < DATA.length; j++) {
    var r = DATA[j];
    if ((!cat || r.categoria === cat) && (!est || r.estado === est)) { filtrados.push(r); }
  }
  for (var k = 0; k < filtrados.length; k++) {
    var m = makeMarker(filtrados[k]);
    m.addTo(map);
    markers.push(m);
    markerMap[filtrados[k].nombre] = {marker: m, data: filtrados[k]};
  }
  document.getElementById('stats').textContent = filtrados.length + ' establecimientos';
}

function onBusqueda() {
  var val = document.getElementById('filtroBusqueda').value;
  var sugBox = document.getElementById('suggestions');
  if (val.trim().length < 2) { sugBox.style.display = 'none'; return; }
  var norm = normalizar(val);
  var matches = [];
  for (var j = 0; j < DATA.length; j++) {
    if (normalizar(DATA[j].nombre).indexOf(norm) !== -1) {
      matches.push(DATA[j]);
      if (matches.length >= 8) break;
    }
  }
  if (matches.length === 0) { sugBox.style.display = 'none'; return; }
  var html = '';
  for (var i = 0; i < matches.length; i++) {
    html += '<div class="suggestion-item" onclick="seleccionar(' + i + ')">' + matches[i].nombre + '<span>' + matches[i].categoria + '</span></div>';
  }
  sugBox.innerHTML = html;
  sugBox._matches = matches;
  sugBox.style.display = 'block';
}

function seleccionar(idx) {
  var sugBox = document.getElementById('suggestions');
  var r = sugBox._matches[idx];
  document.getElementById('filtroBusqueda').value = r.nombre;
  sugBox.style.display = 'none';
  if (markerMap[r.nombre]) {
    map.setView([r.lat, r.lng], 17);
    markerMap[r.nombre].marker.openPopup();
  }
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrapper')) {
    document.getElementById('suggestions').style.display = 'none';
  }
});

aplicarFiltros();
</script>
</body>
